services:
  doctto-tenancy-db:
    container_name: doctto-tenancy-db
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - crm_db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXTERNAL:-5481}:5432"
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  doctto-tenancy-app:
    container_name: doctto-tenancy-app
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    env_file:
      - .env
    environment:
      DB_HOST: doctto-tenancy-db
      CONTAINER_ROLE: app
    volumes:
      - ${VOLUME_MOUNT:-./:/var/www/html}
    ports:
      - "${APP_PORT:-8001}:${INTERNAL_PORT:-8000}"
    depends_on:
      doctto-tenancy-db:
        condition: service_healthy
    networks:
      - crm-network
    restart: unless-stopped

  doctto-tenancy-nginx:
    container_name: doctto-tenancy-nginx
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_PUBLIC_MOUNT:-./public:/var/www/html/public:ro}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    depends_on:
      - doctto-tenancy-app
    networks:
      - crm-network
    restart: unless-stopped
    profiles:
      - production

  doctto-tenancy-queue:
    container_name: doctto-tenancy-queue
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    env_file:
      - .env
    environment:
      DB_HOST: doctto-tenancy-db
      CONTAINER_ROLE: queue
    volumes:
      - ${VOLUME_MOUNT:-./:/var/www/html}
    depends_on:
      doctto-tenancy-db:
        condition: service_healthy
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    networks:
      - crm-network
    restart: unless-stopped

  doctto-tenancy-scheduler:
    container_name: doctto-tenancy-scheduler
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    env_file:
      - .env
    environment:
      DB_HOST: doctto-tenancy-db
      CONTAINER_ROLE: scheduler
    volumes:
      - ${VOLUME_MOUNT:-./:/var/www/html}
    depends_on:
      - doctto-tenancy-app
    command: php artisan schedule:work
    networks:
      - crm-network
    restart: unless-stopped

volumes:
  crm_db_data:
    driver: local

networks:
  crm-network:
    driver: bridge
